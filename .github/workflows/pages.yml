name: Deploy Luméra demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare static storefront
        run: |
          mkdir -p pages-dist
          cp github-pages/index.html pages-dist/index.html
          cp github-pages/index.html pages-dist/404.html
          cp public/lumera-hero.png public/og.png pages-dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
