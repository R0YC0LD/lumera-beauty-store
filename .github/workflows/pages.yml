name: Deploy Luméra Store to GitHub Pages

# Pages yayın kaynağı "main /(root)" dalı olarak ayarlı: GitHub, kök dizindeki
# siteyi her push'ta otomatik yayınlar (CNAME: lumrea.com). Bu iş akışı yalnızca
# yayın kaynağı tekrar "GitHub Actions" yapılırsa elle çalıştırılmak içindir.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare complete storefront
        run: |
          mkdir -p pages-dist
          cp -R github-pages/. pages-dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist
      - uses: actions/deploy-pages@v4
        id: deployment
